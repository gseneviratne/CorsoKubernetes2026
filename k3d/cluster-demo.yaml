apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: corso-demo
servers: 1
agents: 2
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
options:
  k3s:
    # Usiamo ingress-nginx (non Traefik) per compatibilita con i manifest della demo.
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
