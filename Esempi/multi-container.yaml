apiVersion: v1
kind: Pod
metadata:
  name: app-with-db
spec:
  containers:
    - name: db
      image: postgres:15
      env:
        - name: POSTGRES_PASSWORD
          value: example
      ports:
        - containerPort: 5432

    - name: app
      image: node:18
      command: ["sh", "-c", "until nc -z localhost 5432; do echo waiting for db; sleep 2; done; node app.js"]
      env:
        - name: DB_HOST
          value: localhost