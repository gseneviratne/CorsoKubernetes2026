apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-cron
  namespace: lab3
  labels:
    app: hello-cron
spec:
  schedule: "*/1 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: hello-cron
        spec:
          restartPolicy: Always
          containers:
            - name: hello
              image: busybox:1.36.1
              command: ["sh", "-lc"]
              args:
                - |
                  echo "ciao da CronJob $(date)";
                  echo "lavoro completato"
