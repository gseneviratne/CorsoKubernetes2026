apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-rollout
  namespace: lab3
  labels:
    app: web-rollout
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-rollout
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: web-rollout
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
