apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
spec:
  template:
    spec:
      containers:
      - name: portal
        env:
        - name: ENVIRONMENT
          value: prod
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: portal-secret
              key: API_TOKEN
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
