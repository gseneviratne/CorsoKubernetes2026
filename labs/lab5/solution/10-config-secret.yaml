apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-env
  namespace: lab5
data:
  APP_MODE: training
  LOG_LEVEL: debug
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-page
  namespace: lab5
data:
  index.html: |
    <!doctype html>
    <html>
    <body>
      <h1>Lab5 portal</h1>
      <p>Created from ConfigMap portal-page.</p>
    </body>
    </html>
---
apiVersion: v1
kind: Secret
metadata:
  name: portal-secret
  namespace: lab5
type: Opaque
stringData:
  API_TOKEN: lab5-token
