apiVersion: v1
kind: Pod
metadata:
  name: app
  namespace: pv-lab
  labels:
    app: app
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -lc
        - echo started > /data/start.txt && sleep 3600
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: pvc-lab-data
