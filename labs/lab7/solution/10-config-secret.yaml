apiVersion: v1
kind: ConfigMap
metadata:
  name: web-page
  namespace: lab7
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <title>Lab7 shop-lite</title>
      </head>
      <body>
        <h1>shop-lite</h1>
        <p>Frontend served from a ConfigMap.</p>
        <p>Try <code>/api/</code> from the cluster to talk to the backend.</p>
      </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: lab7
data:
  APP_MODE: production
  CACHE_HOST: cache-0.cache.lab7.svc.cluster.local
  CACHE_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: lab7
type: Opaque
stringData:
  API_TOKEN: lab7-supersecret
