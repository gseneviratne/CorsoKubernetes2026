apiVersion: v1
kind: Service
metadata:
  name: cache
  namespace: lab7
  labels:
    app: cache
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: cache
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cache
  namespace: lab7
  labels:
    app: cache
spec:
  serviceName: cache
  replicas: 1
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
        - name: cache
          image: busybox:1.36
          command: ["sh", "-lc"]
          args:
            - |
              mkdir -p /data;
              echo "[$(date)] cache started" > /data/start.log;
              while true; do
                echo "[$(date)] tick" >> /data/start.log;
                sleep 30;
              done
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 100Mi
