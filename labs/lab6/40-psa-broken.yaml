apiVersion: apps/v1
kind: Deployment
metadata:
  name: hardened
  namespace: lab6-secure
  labels:
    app: hardened
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hardened
  template:
    metadata:
      labels:
        app: hardened
    spec:
      containers:
        - name: app
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:8080"
            - "-text=cka-hardened-ok"
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
            capabilities:
              add: ["NET_ADMIN"]
