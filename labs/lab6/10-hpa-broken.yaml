apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-hpa
  namespace: lab6
  labels:
    app: web-hpa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-hpa
  template:
    metadata:
      labels:
        app: web-hpa
    spec:
      containers:
        - name: web
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:8080"
            - "-text=cka-hpa-ok"
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: web-hpa
  namespace: lab6
spec:
  type: ClusterIP
  selector:
    app: web-hpa
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: web-hpa
  namespace: lab6
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 5
  maxReplicas: 2
  targetCPUUtilizationPercentage: 50
