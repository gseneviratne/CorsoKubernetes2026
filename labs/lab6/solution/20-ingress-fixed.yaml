apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop
  namespace: lab6
  labels:
    app: shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shop
  template:
    metadata:
      labels:
        app: shop
    spec:
      containers:
        - name: shop
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:8080"
            - "-text=cka-shop-ok"
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: shop
  namespace: lab6
spec:
  type: ClusterIP
  selector:
    app: shop
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shop
  namespace: lab6
spec:
  ingressClassName: traefik
  rules:
    - host: shop.lab6.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shop
                port:
                  number: 80
