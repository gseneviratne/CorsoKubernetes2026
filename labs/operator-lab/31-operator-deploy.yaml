# Deployment dell'operator.
#
# Approccio "no-build": usiamo l'immagine ufficiale `python:3.12-slim` e
# montiamo il sorgente come ConfigMap (creata a parte da operator/main.py).
# All'avvio il container fa pip install delle dipendenze e poi `kopf run`.
# E' lento il primo avvio (~30s) ma evita di dover buildare/pushare
# un'immagine custom durante il lab.
#
# In produzione faresti il contrario: builderesti `operator/Dockerfile`,
# pusheresti su un registry, e questo Deployment farebbe semplicemente
# `image: my-registry/webapp-operator:0.1`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-operator
  namespace: operator-lab
  labels:
    app: webapp-operator
spec:
  replicas: 1
  # con replicas=1 e Recreate evitiamo due operator che corrono insieme
  # senza dover configurare leader election o kopf peering
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: webapp-operator
  template:
    metadata:
      labels:
        app: webapp-operator
    spec:
      serviceAccountName: webapp-operator
      containers:
        - name: operator
          image: python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              echo "[bootstrap] installing kopf + kubernetes client..."
              pip install --no-cache-dir --quiet \
                  -r /opt/operator/requirements.txt
              echo "[bootstrap] launching kopf..."
              exec kopf run --standalone --namespace="${WATCH_NAMESPACE}" /opt/operator/main.py
          env:
            - name: WATCH_NAMESPACE
              value: operator-lab
            - name: PIP_DISABLE_PIP_VERSION_CHECK
              value: "1"
          volumeMounts:
            - name: code
              mountPath: /opt/operator
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: code
          configMap:
            # creata via:
            #   kubectl -n operator-lab create configmap webapp-operator-code \
            #     --from-file=labs/operator-lab/operator/main.py \
            #     --from-file=labs/operator-lab/operator/requirements.txt
            name: webapp-operator-code
