apiVersion: v1
kind: Pod
metadata:
  name: web-node-affinity
  namespace: scheduling-lab
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nodepool
                operator: In
                values:
                  - green
  containers:
    - name: web
      image: busybox:1.36.1
      command: ["sh", "-lc"]
      args:
        - "sleep 365d"
