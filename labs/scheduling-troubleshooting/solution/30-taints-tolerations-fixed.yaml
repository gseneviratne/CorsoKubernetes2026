apiVersion: v1
kind: Pod
metadata:
  name: web-taints
  namespace: scheduling-lab
spec:
  nodeSelector:
    lab: dedicated
  tolerations:
    - key: workload
      operator: Equal
      value: exercise
      effect: NoSchedule
  containers:
    - name: web
      image: busybox:1.36.1
      command: ["sh", "-lc"]
      args:
        - "sleep 365d"
