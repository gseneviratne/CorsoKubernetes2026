apiVersion: v1
kind: Service
metadata:
  name: {{ include "webapp.fullname" . }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - name: http
    port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
  # FIX D: il selector usa lo stesso helper del pod template.
  # Cosi cambia automaticamente se i selectorLabels cambiano.
  selector:
    {{- include "webapp.selectorLabels" . | nindent 4 }}
