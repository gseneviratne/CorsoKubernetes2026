replicaCount: 1

image:
  repository: nginx
  # Se vuoto usa .Chart.AppVersion (definito in Chart.yaml).
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

# Variabili applicative iniettate via ConfigMap envFrom.
# BUG C: il template configmap.yaml usa "required" su config.appMode
# ma qui la chiave non e definita. helm template fallisce.
config:
  logLevel: info
  featureFlags: basic

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
