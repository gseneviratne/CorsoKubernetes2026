apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: kyverno-lab
  labels:
    app: web
    team: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        team: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
