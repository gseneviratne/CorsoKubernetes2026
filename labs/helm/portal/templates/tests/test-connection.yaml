apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "portal.fullname" . }}-test"
  labels:
    {{- include "portal.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: curl
    image: curlimages/curl:8.10.1
    command: ["sh", "-c"]
    args:
    - |
      set -e
      url="http://{{ include "portal.fullname" . }}:{{ .Values.service.port }}/"
      echo "Testing $url"
      curl -fsS "$url" >/dev/null
      echo "OK"
